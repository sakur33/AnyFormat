name: Rebuild usefulapps.dev

# usefulapps.dev is a static site. It reads this repo's README and latest release
# at build time, so neither an edited README nor a new release reaches the page
# until the site rebuilds. This tells it to.
on:
  push:
    branches: [main]
    paths: ['README.md']
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # --fail turns a rejected hook into a failed job instead of a silent no-op.
          curl --fail --silent --show-error -X POST "$HOOK"
          echo "Deploy hook triggered — usefulapps.dev is rebuilding."
