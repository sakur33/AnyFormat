<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B1020" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#sheen)"/>

  <!-- Símbolo de conversión: doble flecha (convertir / cualquier formato) -->
  <g filter="url(#shadow)">
    <!-- Flecha superior: izquierda -> derecha -->
    <path d="M150 198 H318 L318 158 L392 218 L318 278 L318 238 H150 Z"
          fill="#FFFFFF"/>
    <!-- Flecha inferior: derecha -> izquierda -->
    <path d="M362 314 H194 L194 274 L120 334 L194 394 L194 354 H362 Z"
          fill="#FFFFFF" fill-opacity="0.9"/>
  </g>
</svg>
